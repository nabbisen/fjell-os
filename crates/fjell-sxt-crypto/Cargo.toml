[package]
name = "fjell-sxt-crypto"
description = "TLS 1.3 crypto primitives for secure-transportd: AES-128-GCM, X25519, HKDF-SHA256 (RFC v0.4-003)."
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
publish = false

[lib]
name = "fjell_sxt_crypto"
path = "src/lib.rs"

[dependencies]
fjell-measure-format = { path = "../fjell-measure-format" }

[features]
default = []
# WARNING: Enables the development crypto profile (RFC-v0.7.3-002).
# The AES implementation uses a lookup table and may be vulnerable to
# cache-timing attacks. The HKDF implementation uses assert!() for bounds
# (fixed in v0.7.1). Release builds MUST NOT enable this feature.
# Migration plan: v0.9 replaces this crate with a vetted no_std library.
crypto-profile-development = []
