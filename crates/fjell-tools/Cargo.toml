[package]
name = "fjell-tools"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
publish = false

# This crate always targets the host, not the bare-metal RISC-V target.
# Build it with: cargo build --package fjell-tools --target x86_64-unknown-linux-gnu

[[bin]]
name = "fjell-tools"
path = "src/main.rs"

[dependencies]
fjell-dev-harness   = { path = "../fjell-dev-harness" }
fjell-cap-manifest  = { path = "../fjell-cap-manifest" }
fjell-sig-ed25519   = { path = "../fjell-sig-ed25519" }
getrandom           = { version = "0.2", features = ["std"] }
argon2              = "0.5"
aes-gcm             = "0.10"
