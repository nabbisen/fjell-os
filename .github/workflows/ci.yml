# GitHub Actions CI for Fjell OS.
#
# Job topology:
#   ci-format          — cargo fmt --check
#   ci-check           — cargo check (host-buildable crates)
#   ci-cross-check     — cargo check (RISC-V service + kernel crates)
#   ci-test-host       — host unit tests
#   ci-docs            — mdbook build
#   ci-qemu-smoke      — qemu-test m1..m8
#   ci-qemu-negative   — qemu-negative <cat> per category

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'  # Weekly fuzz nightly

env:
  CARGO_TERM_COLOR: always
  RUSTC_BOOTSTRAP: 1
  RUST_BACKTRACE: 1

jobs:
  ci-format:
    name: format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.91
        run: |
          sudo apt-get update
          sudo apt-get install -y rustc-1.91 cargo-1.91
          mkdir -p $HOME/.local/bin
          ln -sf /usr/bin/rustc-1.91 $HOME/.local/bin/rustc
          ln -sf /usr/bin/cargo-1.91 $HOME/.local/bin/cargo
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: cargo fmt --check
        run: cargo fmt --all --check

  ci-check:
    name: check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.91 + rust-src
        run: |
          sudo apt-get update
          sudo apt-get install -y rustc-1.91 cargo-1.91 rust-src
          mkdir -p $HOME/.local/bin
          ln -sf /usr/bin/rustc-1.91 $HOME/.local/bin/rustc
          ln -sf /usr/bin/cargo-1.91 $HOME/.local/bin/cargo
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: cargo check (host-buildable crates)
        # Covers format/api/tools crates plus the enforcement and syscall
        # libraries added in v0.2.  The RISC-V kernel and service binaries
        # are covered by ci-cross-check.
        run: |
          cargo check \
              -p fjell-tools \
              -p fjell-cap \
              -p fjell-ipc \
              -p fjell-syscall \
              -p fjell-service-api \
              -p fjell-cap-broker \
              -p fjell-neg-test \
              -p fjell-service-manager \
              -p fjell-bootctl \
              -p fjell-attestation-format \
              -p fjell-audit-format \
              -p fjell-block-format \
              -p fjell-config-format \
              -p fjell-device-format \
              -p fjell-measure-format \
              -p fjell-recovery-format \
              -p fjell-rootfs-format \
              -p fjell-semantic-format \
              -p fjell-snapshot-format \
              -p fjell-store-format \
              -p fjell-upgrade-format \
              -p fjell-verify-format

  ci-cross-check:
    name: cross-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.91 + rust-src + LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y rustc-1.91 cargo-1.91 rust-src llvm
          mkdir -p $HOME/.local/bin
          ln -sf /usr/bin/rustc-1.91 $HOME/.local/bin/rustc
          ln -sf /usr/bin/cargo-1.91 $HOME/.local/bin/cargo
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: cargo check (riscv64gc-unknown-none-elf)
        # Type-checks the kernel and all service binaries for the RISC-V
        # bare-metal target.  This catches register-constant gaps, wrong
        # import paths, and asm errors that the host ci-check cannot see.
        # Requires rust-src for -Z build-std.
        run: |
          cargo check \
              --target riscv64gc-unknown-none-elf \
              -Z build-std=core,compiler_builtins \
              -p fjell-kernel \
              -p fjell-init \
              -p fjell-auditd \
              -p fjell-cap-broker \
              -p fjell-neg-test \
              -p fjell-bootctl \
              -p fjell-service-manager \
              -p fjell-sample-service

  ci-test-host:
    name: test-host
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.91
        run: |
          sudo apt-get update
          sudo apt-get install -y rustc-1.91 cargo-1.91
          mkdir -p $HOME/.local/bin
          ln -sf /usr/bin/rustc-1.91 $HOME/.local/bin/rustc
          ln -sf /usr/bin/cargo-1.91 $HOME/.local/bin/cargo
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: cargo test (host-pure crates)
        # Includes fjell-cap (16 enforcement tests) and fjell-ipc (10 endpoint
        # tests) added in v0.2, in addition to the format/api/tools crates.
        run: |
          cargo test --lib --bins \
              -p fjell-tools \
              -p fjell-cap \
              -p fjell-ipc \
              -p fjell-attestation-format \
              -p fjell-audit-format \
              -p fjell-block-format \
              -p fjell-config-format \
              -p fjell-device-format \
              -p fjell-measure-format \
              -p fjell-recovery-format \
              -p fjell-rootfs-format \
              -p fjell-semantic-format \
              -p fjell-service-api \
              -p fjell-snapshot-format \
              -p fjell-store-format \
              -p fjell-upgrade-format \
              -p fjell-verify-format


  ci-test-services:
    name: test-services
    runs-on: ubuntu-24.04
    needs: [ci-check]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.91
        run: |
          sudo apt-get update
          sudo apt-get install -y rustc-1.91 cargo-1.91 rust-src
          mkdir -p $HOME/.local/bin
          ln -sf /usr/bin/rustc-1.91 $HOME/.local/bin/rustc
          ln -sf /usr/bin/cargo-1.91 $HOME/.local/bin/cargo
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Test additional lib crates
        run: |
          cargo test \
            -p fjell-arch \
            -p fjell-abi \
            -p fjell-trust-provider \
            -p fjell-keyring \
            -p fjell-arch-riscv64 \
            -p fjell-fleet-format \
            -p fjell-remote-diag-format \
            -p fjell-policy-format \
            -p fjell-semantic-stream \
            -p fjell-proxy-text \
            -p fjell-ci-coverage \
            --lib
      - name: Cross-check service binaries (RISC-V)
        env:
          RUSTC_BOOTSTRAP: 1
        run: |
          cargo check \
            -p fjell-identityd -p fjell-summaryd -p fjell-syncd \
            -p fjell-netd -p fjell-diagnosticsd \
            -p fjell-recoveryd -p fjell-attestd -p fjell-measuredd \
            -p fjell-configd -p fjell-devmgr \
            -p fjell-storaged -p fjell-upgraded -p fjell-powerd \
            -p fjell-verifyd -p fjell-rootfsd -p fjell-snapshotd \
            -p fjell-driver-virtio-blk \
            -p fjell-driver-virtio-net -p fjell-secure-transportd \
            -p fjell-fleetd \
            --target riscv64gc-unknown-none-elf \
            -Z build-std=core,compiler_builtins

  ci-docs:
    name: docs
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin
      - name: mdbook build
        run: cd docs && mdbook build

  ci-qemu-smoke:
    name: qemu-smoke
    runs-on: ubuntu-24.04
    needs: [ci-check]
    strategy:
      fail-fast: false
      matrix:
        milestone: [m1, m2, m3, m4, m5, m6, m7, m8]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.91 + QEMU + LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y rustc-1.91 cargo-1.91 rust-src \
              qemu-system-misc llvm
          mkdir -p $HOME/.local/bin
          ln -sf /usr/bin/rustc-1.91 $HOME/.local/bin/rustc
          ln -sf /usr/bin/cargo-1.91 $HOME/.local/bin/cargo
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: cargo xtask qemu-test ${{ matrix.milestone }}
        run: cargo xtask qemu-test ${{ matrix.milestone }}
      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-smoke-${{ matrix.milestone }}
          path: tests/qemu/artifacts/smoke-${{ matrix.milestone }}/
          if-no-files-found: warn

  ci-qemu-negative:
    name: qemu-negative
    runs-on: ubuntu-24.04
    needs: [ci-check]
    strategy:
      fail-fast: false
      matrix:
        # v0.2.23: full matrix including harness (RFC 050) added at v0.2.12.
        category: [capability, ipc, mmio, dma, user-copy, audit, policy, svc, harness]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.91 + QEMU + LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y rustc-1.91 cargo-1.91 rust-src \
              qemu-system-misc llvm
          mkdir -p $HOME/.local/bin
          ln -sf /usr/bin/rustc-1.91 $HOME/.local/bin/rustc
          ln -sf /usr/bin/cargo-1.91 $HOME/.local/bin/cargo
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: cargo xtask qemu-negative ${{ matrix.category }}
        run: cargo xtask qemu-negative ${{ matrix.category }}
      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-negative-${{ matrix.category }}
          path: tests/qemu/artifacts/negative-${{ matrix.category }}/
          if-no-files-found: warn

  # ── v0.7.x hardening gates (RFC-v0.7.1-002) ──────────────────────────────

  ci-test-v07-formats:
    name: test-v07-formats
    runs-on: ubuntu-24.04
    needs: [ci-check]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.91
        run: |
          sudo apt-get update
          sudo apt-get install -y rustc-1.91 cargo-1.91 rust-src
          mkdir -p $HOME/.local/bin
          ln -sf /usr/bin/rustc-1.91 $HOME/.local/bin/rustc
          ln -sf /usr/bin/cargo-1.91 $HOME/.local/bin/cargo
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Test v0.4-v0.7 format crates
        run: |
          cargo test \
            -p fjell-net-format \
            -p fjell-sxt-crypto \
            -p fjell-diag-format \
            -p fjell-platform-format \
            -p fjell-semantic-v1 \
            -p fjell-dtb-derive \
            -p fjell-identity-format \
            -p fjell-summary-format \
            -p fjell-snapshot-format \
            --lib

  ci-proptest:
    name: proptest
    runs-on: ubuntu-24.04
    needs: [ci-check]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.91
        run: |
          sudo apt-get update
          sudo apt-get install -y rustc-1.91 cargo-1.91 rust-src
          mkdir -p $HOME/.local/bin
          ln -sf /usr/bin/rustc-1.91 $HOME/.local/bin/rustc
          ln -sf /usr/bin/cargo-1.91 $HOME/.local/bin/cargo
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Property tests
        run: |
          cargo test -p fjell-proptest      --lib
          cargo test -p fjell-store-model   --lib
          cargo test -p fjell-bootctl-model --lib

  ci-unsafe-audit:
    name: unsafe-audit
    runs-on: ubuntu-24.04
    needs: [ci-check]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.91
        run: |
          sudo apt-get update
          sudo apt-get install -y rustc-1.91 cargo-1.91 rust-src
          mkdir -p $HOME/.local/bin
          ln -sf /usr/bin/rustc-1.91 $HOME/.local/bin/rustc
          ln -sf /usr/bin/cargo-1.91 $HOME/.local/bin/cargo
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Unsafe audit (category= check)
        run: cargo run -p fjell-unsafe-audit -- --root crates --check

  ci-arm64-check:
    name: arm64-check
    runs-on: ubuntu-24.04
    needs: [ci-check]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.91 + AArch64 target
        run: |
          sudo apt-get update
          sudo apt-get install -y rustc-1.91 cargo-1.91 rust-src
          mkdir -p $HOME/.local/bin
          ln -sf /usr/bin/rustc-1.91 $HOME/.local/bin/rustc
          ln -sf /usr/bin/cargo-1.91 $HOME/.local/bin/cargo
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          rustup target add aarch64-unknown-none
      - name: cargo check arch boundary (ARM64)
        run: |
          cargo check -p fjell-arch-arm64 \
            --target aarch64-unknown-none \
            -Z build-std=core,compiler_builtins

  ci-schema-gate:
    name: schema-gate
    runs-on: ubuntu-24.04
    needs: [ci-check]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.91
        run: |
          sudo apt-get update
          sudo apt-get install -y rustc-1.91 cargo-1.91 rust-src
          mkdir -p $HOME/.local/bin
          ln -sf /usr/bin/rustc-1.91 $HOME/.local/bin/rustc
          ln -sf /usr/bin/cargo-1.91 $HOME/.local/bin/cargo
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Verify frozen schemas have not drifted
        run: |
          # Scan for BREAKING-SCHEMA markers in modified files (PR context only).
          # On push to main, any schema file must match its *.frozen counterpart.
          # Full schema-dump tooling lands with the fjell-tools schema subcommand.
          echo "schema-gate: checking *.frozen files are committed"
          find crates -name "*.frozen" | while read f; do
            if [ ! -s "$f" ]; then
              echo "ERROR: empty frozen schema: $f"
              exit 1
            fi
          done
          echo "schema-gate: all *.frozen files present and non-empty"

  ci-qemu-v07:
    name: qemu-v07
    runs-on: ubuntu-24.04
    needs: [ci-check]
    strategy:
      fail-fast: false
      matrix:
        category: [v0.4-net, v0.5-platform, v0.7-sync]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.91 + QEMU + LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y rustc-1.91 cargo-1.91 rust-src \
              qemu-system-misc llvm
          mkdir -p $HOME/.local/bin
          ln -sf /usr/bin/rustc-1.91 $HOME/.local/bin/rustc
          ln -sf /usr/bin/cargo-1.91 $HOME/.local/bin/cargo
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: cargo xtask qemu-test ${{ matrix.category }}
        run: cargo xtask qemu-test ${{ matrix.category }}
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-v07-${{ matrix.category }}
          path: tests/qemu/artifacts/smoke-${{ matrix.category }}/
          if-no-files-found: warn

  ci-fuzz-nightly:
    name: fuzz-nightly
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        target:
          - attestation_v2_parse
          - release_metadata_parse
          - rollback_record_parse
          - keyring_snapshot_parse
          - board_profile_parse
          - update_index_parse
          - diagnostic_bundle_parse
          - semantic_record_parse
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust nightly + cargo-fuzz
        run: |
          sudo apt-get update
          sudo apt-get install -y rustup
          rustup toolchain install nightly
          cargo +nightly install cargo-fuzz
      - name: Run fuzz target (${{ matrix.target }})
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} \
            -- -max_total_time=300
      - name: Upload corpus/crash artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-${{ matrix.target }}
          path: fuzz/corpus/${{ matrix.target }}/
          if-no-files-found: warn

  # Verus proof machine-check (RFC-v0.17-005 / RFC-v0.18-001).
  # NON-BLOCKING on push: continue-on-error keeps Verus off the merge path
  # (never a Fjell build dependency). This job RECORDS the VERUS:TARGET:*
  # markers per milestone (the promotion-ledger evidence). The BLOCKING gate
  # for release-required targets (capability, lease) lives in the release-time
  # `release-rehearsal` (Gate 10), not here. Pin: TOOLCHAIN.lock.
  ci-verus:
    name: verus
    runs-on: ubuntu-24.04
    needs: [ci-check]
    continue-on-error: true
    env:
      VERUS_TAG: release/0.2026.05.24.ecee80a
      VERUS_ASSET: verus-0.2026.05.24.ecee80a-x86-linux.zip
      VERUS_TOOLCHAIN: 1.95.0-x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.91 (Fjell build toolchain)
        run: |
          sudo apt-get update
          sudo apt-get install -y rustc-1.91 cargo-1.91 rust-src unzip rustup
          mkdir -p $HOME/.local/bin
          ln -sf /usr/bin/rustc-1.91 $HOME/.local/bin/rustc
          ln -sf /usr/bin/cargo-1.91 $HOME/.local/bin/cargo
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Install rustup toolchain Verus requires
        run: rustup toolchain install "$VERUS_TOOLCHAIN" --profile minimal
      - name: Install pinned Verus (bundled z3)
        run: |
          TAG_ENC=$(printf '%s' "$VERUS_TAG" | sed 's#/#%2F#g')
          URL="https://github.com/verus-lang/verus/releases/download/${TAG_ENC}/${VERUS_ASSET}"
          curl -sL --max-time 300 "$URL" -o /tmp/verus.zip
          mkdir -p /tmp/verus && unzip -q /tmp/verus.zip -d /tmp/verus
          VDIR=$(dirname "$(find /tmp/verus -name verus -type f | head -1)")
          chmod +x "$VDIR"/verus "$VDIR"/rust_verify "$VDIR"/z3 || true
          echo "$VDIR" >> $GITHUB_PATH
      - name: Verus version
        run: verus --version
      - name: Machine-check pilot proofs + record markers
        run: |
          cargo run -q -p fjell-tools -- verus-check --all-pilot \
            | tee verus-markers.txt
          echo "### Verus machine-check ($VERUS_TAG)" >> $GITHUB_STEP_SUMMARY
          grep 'VERUS:TARGET' verus-markers.txt >> $GITHUB_STEP_SUMMARY || true
          # Surface a real proof FAIL loudly without gating the pipeline.
          if grep -q ':FAIL' verus-markers.txt; then
            echo "::warning::a Verus proof target FAILED (non-blocking, Stage A)"
          fi
      - name: Upload marker log (milestone record)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verus-markers
          path: verus-markers.txt
          if-no-files-found: warn
