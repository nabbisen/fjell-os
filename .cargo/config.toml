[alias]
xtask = "run --package fjell-tools --"

# ── RISC-V bare-metal target configuration ────────────────────────────────────
#
# Linker: Fjell OS requires a RISC-V-capable linker.  Two options:
#
#   Option A — LLVM LLD (recommended, cross-platform):
#     Ubuntu/Debian:  sudo apt install lld
#     Arch Linux:     sudo pacman -S lld
#     macOS:          brew install llvm  (then add to PATH)
#     Windows:        winget install LLVM.LLVM
#
#   Option B — GNU binutils for RISC-V:
#     Ubuntu/Debian:  sudo apt install gcc-riscv64-unknown-elf
#     Arch Linux:     sudo pacman -S riscv64-elf-binutils
#     macOS:          brew install riscv-gnu-toolchain
#
#   To switch to Option B, change the [target.riscv64gc-unknown-none-elf]
#   section below:
#     linker = "riscv64-unknown-elf-ld"
#     rustflags = ["-C", "code-model=medium", "-C", "linker-flavor=ld"]
#
# objcopy (needed by `cargo xtask build-services`):
#   Option A:  llvm-objcopy  (from the lld / llvm package above)
#   Option B:  riscv64-unknown-elf-objcopy  (from gcc-riscv64-unknown-elf)
#
# The xtask automatically tries both names; set FJELL_OBJCOPY to override.

[target.riscv64gc-unknown-none-elf]
linker  = "ld.lld"
rustflags = [
    "-C", "linker-flavor=ld",
    "-C", "link-arg=-m",
    "-C", "link-arg=elf64lriscv",
    "-C", "code-model=medium",
]
