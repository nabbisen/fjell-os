# Verus proof targets (RFC-v0.17-005). Read by `cargo xtask verus-check`.
#
# tier:              2 = pilot-required (touched-module gate), 3 = release-critical
# release_required:  whether a failing proof blocks a release tag
#                    (false during v0.17.0 Stage A; promoted per the staging policy)
# rust_conformance:  the host-testable bridge that runs in ordinary `cargo test`

[[target]]
name             = "capability"
proof            = "verification/verus/capability/rights_lattice.rs"
tier             = 3
release_required = false
rust_conformance = "crates/fjell-cap/tests/verus_conformance.rs"
conformance_cmd  = "cargo test -p fjell-cap --test verus_conformance"
maps_to          = "crates/fjell-cap/src/rights.rs::CapRights::is_subset_of"

[[target]]
name             = "lease"
proof            = "verification/verus/lease/lease_epoch.rs"
tier             = 3
release_required = false
rust_conformance = "crates/fjell-cap/tests/lease_conformance.rs"
conformance_cmd  = "cargo test -p fjell-cap --test lease_conformance"
maps_to          = "crates/fjell-kernel/src/lease/mod.rs + fjell_abi::lease"

[[target]]
name             = "boot-control"
proof            = "verification/verus/boot-control/mirror_selection.rs"
tier             = 2
release_required = false
rust_conformance = "crates/fjell-upgrade-format/tests/mirror_conformance.rs"
conformance_cmd  = "cargo test -p fjell-upgrade-format --test mirror_conformance"
maps_to          = "crates/fjell-upgrade-format/src/lib.rs::select_bcb_mirror"
